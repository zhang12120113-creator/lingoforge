    <script>
      (function() {
        var VALID_THEMES = ['light','gray','star','warm'];
        var theme = 'light';
        try {
          var saved = localStorage.getItem('lingoforge-theme');
          if (saved && VALID_THEMES.indexOf(saved) !== -1) {
            theme = saved;
          } else {
            var legacy = localStorage.getItem('theme');
            if (legacy === 'dark') theme = 'star';
            else if (legacy === 'light') theme = 'light';
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches) theme = 'star';
          }
        } catch (e) {}
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        if (theme === 'gray' || theme === 'star') root.classList.add('dark');
      })();
    </script>
